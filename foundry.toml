[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Compiler
solc = "0.8.28"
evm_version = "london"

# fs permissions
fs_permissions = [
  { access = "read", path = "data/" },
  { access = "read-write", path = "deployments.json" },
]

[profile.default.env]
dotenv = ".env"

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
